<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Gear PK | Premium Gadgets</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-color: #fbbf24;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --amazon-gold: #FFD814;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 0;
        }

        /* Header & Branding */
        header {
            padding: 20px;
            text-align: center;
            background: linear-gradient(to bottom, #1e293b, #0f172a);
        }

        .brand-logo {
            font-size: 28px;
            font-weight: 800;
            color: var(--accent-color);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 15px;
        }

        /* Search Engine */
        .search-container {
            position: relative;
            max-width: 500px;
            margin: 0 auto 20px;
        }

        .search-container input {
            width: 100%;
            padding: 12px 20px;
            border-radius: 25px;
            border: none;
            background: var(--card-bg);
            color: white;
            font-size: 16px;
            outline: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        /* Navigation Tabs */
        .nav-tabs {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .tab {
            padding: 8px 20px;
            background: var(--card-bg);
            border-radius: 20px;
            cursor: pointer;
            font-weight: 500;
            transition: 0.3s;
            border: 1px solid transparent;
        }

        .tab:hover, .tab.active {
            background: var(--accent-color);
            color: #000;
        }

        /* Product Card */
        .main-content {
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .product-card {
            background: var(--card-bg);
            width: 100%;
            max-width: 400px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #334155;
        }

        .product-img {
            width: 100%;
            height: 300px;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
        }

        .product-img img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .product-info {
            padding: 25px;
        }

        .product-info h2 {
            font-size: 20px;
            margin: 0 0 10px;
            line-height: 1.4;
        }

        .review-stars {
            color: #fbbf24;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .features {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 20px;
            line-height: 1.6;
        }

        /* Buttons & Actions */
        .action-btns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 15px;
        }

        .btn {
            padding: 12px;
            border-radius: 10px;
            text-align: center;
            text-decoration: none;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-amazon {
            background: var(--amazon-gold);
            color: #111;
            grid-column: span 2;
        }

        .btn-wa {
            background: #25D366;
            color: white;
        }

        .btn-copy {
            background: #6366f1;
            color: white;
        }

        /* Footer & Privacy */
        footer {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-secondary);
            font-size: 12px;
        }

        .privacy-link {
            color: var(--accent-color);
            text-decoration: none;
            margin-top: 10px;
            display: inline-block;
        }

        /* Toast notification */
        #toast {
            visibility: hidden;
            min-width: 200px;
            background-color: #333;
            color: #fff;
            text-align: center;
            border-radius: 5px;
            padding: 16px;
            position: fixed;
            z-index: 1;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
        }

        #toast.show {
            visibility: visible;
            animation: fadein 0.5s, fadeout 0.5s 2.5s;
        }

        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }
    </style>
</head>
<body>

<header>
    <div class="brand-logo">Smart Gear PK</div>
    <div class="search-container">
        <input type="text" id="searchInput" placeholder="Search gadgets..." onkeyup="searchWork()">
    </div>
</header>

<div class="nav-tabs">
    <div class="tab active" onclick="tabMsg('All Products Loading...')">All</div>
    <div class="tab" onclick="tabMsg('Gadgets Filtered')">Gadgets</div>
    <div class="tab" onclick="alert('Coming Soon!')">Mobile Comparison</div>
</div>

<div class="main-content">
    <div class="product-card" id="productCard">
        <div class="product-img">
            <img src="https://m.media-amazon.com/images/I/61iXWpX-B2L._AC_SL1500_.jpg" alt="Smart Ring">
        </div>
        <div class="product-info">
            <h2>Aoyool Smart Health Ring</h2>
            <div class="review-stars">
                <i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star-half-alt"></i>
                <span style="color: #94a3b8; font-size: 12px;">(1,240 Reviews)</span>
            </div>
            <div class="features">
                • Heart Rate & SpO2 Tracking<br>
                • IP68 Waterproof Gold Finish<br>
                • No Subscription Fee
            </div>
            
            <div class="action-btns">
                <a href="https://www.amazon.com/dp/B0G1CB4F1F?tag=mobilecompa09-20" target="_blank" class="btn btn-amazon">
                    <i class="fab fa-amazon"></i> BUY ON AMAZON
                </a>
                <a href="https://wa.me/YOUR_NUMBER" class="btn btn-wa">
                    <i class="fab fa-whatsapp"></i> WHATSAPP
                </a>
                <div class="btn btn-copy" onclick="copyLink()">
                    <i class="fas fa-copy"></i> COPY LINK
                </div>
            </div>
        </div>
    </div>
</div>

<div id="toast">Link Copied to Clipboard!</div>

<footer>
    <p>&copy; 2026 Smart Gear PK. All Rights Reserved.</p>
    <a href="#" class="privacy-link" onclick="alert('Privacy Policy: We do not store your data. We use affiliate links to earn commission.')">Privacy Policy & Terms</a>
</footer>

<script>
    // Search Functionality
    function searchWork() {
        let input = document.getElementById('searchInput').value.toLowerCase();
        let card = document.getElementById('productCard');
        let title = document.querySelector('.product-info h2').innerText.toLowerCase();
        
        if (title.includes(input)) {
            card.style.display = "block";
        } else {
            card.style.display = "none";
        }
    }

    // Tab Functionality
    function tabMsg(msg) {
        console.log(msg);
        // Add filtering logic here if you have more products
    }

    // Copy Link Functionality
    function copyLink() {
        const url = "https://www.amazon.com/dp/B0G1CB4F1F?tag=mobilecompa09-20";
        navigator.clipboard.writeText(url);
        
        var x = document.getElementById("toast");
        x.className = "show";
        setTimeout(function(){ x.className = x.className.replace("show", ""); }, 3000);
    }
</script>

</body>
</html>
