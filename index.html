<!DOCTYPE html>
<html lang="en">
<head>
<style>
    /* Main Card Styling */
    .product-container {
        max-width: 380px;
        margin: 20px auto;
        border: 1px solid #ddd;
        border-radius: 12px;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        overflow: hidden;
        box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        background: #fff;
        transition: transform 0.3s ease;
    }

    .product-container:hover {
        transform: translateY(-8px);
        box-shadow: 0 15px 30px rgba(0,0,0,0.15);
    }

    /* Image Section */
    .image-box {
        padding: 20px;
        background: #f9f9f9;
        text-align: center;
        position: relative;
    }

    .image-box img {
        max-width: 100%;
        height: 250px;
        object-fit: contain;
    }

    .badge {
        position: absolute;
        top: 10px;
        right: 10px;
        background: #ff4747;
        color: white;
        padding: 5px 12px;
        border-radius: 20px;
        font-size: 12px;
        font-weight: bold;
    }

    /* Content Section */
    .content-box {
        padding: 20px;
    }

    .brand-name {
        font-size: 13px;
        color: #007185;
        text-transform: uppercase;
        font-weight: bold;
        letter-spacing: 1px;
    }

    .product-name {
        font-size: 18px;
        font-weight: 600;
        color: #111;
        margin: 8px 0;
        line-height: 1.4;
    }

    .features-list {
        margin: 15px 0;
        padding: 0;
        list-style: none;
    }

    .features-list li {
        font-size: 13px;
        color: #555;
        margin-bottom: 5px;
        display: flex;
        align-items: center;
    }

    .features-list li::before {
        content: "✓";
        color: #2e7d32;
        font-weight: bold;
        margin-right: 8px;
    }

    /* Price & Button */
    .price-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-top: 20px;
        border-top: 1px solid #eee;
        padding-top: 15px;
    }

    .price-tag {
        font-size: 24px;
        font-weight: bold;
        color: #B12704;
    }

    .amazon-btn {
        background: linear-gradient(to bottom, #f7dfa5, #f0c14b);
        border: 1px solid #a88734;
        color: #111;
        padding: 10px 20px;
        border-radius: 8px;
        text-decoration: none;
        font-size: 14px;
        font-weight: 600;
        transition: 0.2s;
    }

    .amazon-btn:hover {
        background: linear-gradient(to bottom, #f5d78e, #eeb933);
        border-color: #846a29;
    }
</style>
</head>
<body>

<div class="product-container">
    <div class="image-box">
        <span class="badge">Top Rated</span>
        <img src="https://m.media-amazon.com/images/I/61iXWpX-B2L._AC_SL1500_.jpg" alt="Aoyool Smart Ring">
    </div>

    <div class="content-box">
        <span class="brand-name">Visit the Aoyool Store</span>
        <h2 class="product-name">Smart Ring Health & Fitness Tracker (Gold, Size 8)</h2>
        
        <ul class="features-list">
            <li>Heart Rate & SpO2 Monitoring</li>
            <li>Sleep & Activity Tracking</li>
            <li>IP68 Waterproof & 5 Days Battery</li>
            <li>No Subscription Fees</li>
        </ul>

        <div class="price-row">
            <span class="price-tag">Check Price</span>
            <a href="https://www.amazon.com/Aoyool-Activity-Monitoring-Waterproof-Subscription/dp/B0G1CB4F1F?tag=mobilecompa09-20" target="_blank" class="amazon-btn">
                View on Amazon
            </a>
        </div>
    </div>
</div>

</body>
</html>
