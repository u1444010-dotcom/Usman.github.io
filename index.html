<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Gear PK | Dark Premium Gadgets</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');

        :root {
            --bg-dark: #020617;
            --card-dark: #0f172a;
            --accent-gold: #fbbf24;
            --text-white: #f8fafc;
            --text-gray: #94a3b8;
            --glow: rgba(251, 191, 36, 0.15);
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-white);
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            padding-bottom: 50px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Header Section */
        header {
            width: 100%;
            padding: 50px 0;
            text-align: center;
            background: radial-gradient(circle at top, #1e293b 0%, #020617 70%);
        }

        .logo {
            font-size: 40px;
            font-weight: 800;
            color: var(--accent-gold);
            text-shadow: 0 0 20px var(--glow);
            margin-bottom: 20px;
        }

        /* Modern Search Box */
        .search-container {
            max-width: 500px;
            width: 90%;
            margin: 0 auto;
        }

        .search-box {
            width: 100%;
            padding: 18px 25px;
            border-radius: 16px;
            border: 1px solid #334155;
            background: rgba(15, 23, 42, 0.8);
            color: white;
            font-size: 16px;
            outline: none;
            backdrop-filter: blur(10px);
            transition: 0.4s;
            box-sizing: border-box;
        }

        .search-box:focus {
            border-color: var(--accent-gold);
            box-shadow: 0 0 25px var(--glow);
        }

        /* Tabs */
        .nav-bar {
            display: flex;
            gap: 10px;
            margin: 30px 0;
        }

        .nav-item {
            padding: 10px 24px;
            background: #1e293b;
            border-radius: 12px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: 0.3s;
            border: 1px solid #334155;
        }

        .active-tab, .nav-item:hover {
            background: var(--accent-gold);
            color: #000;
            border-color: var(--accent-gold);
        }

        /* Glassmorphic Card */
        .card {
            background: var(--card-dark);
            width: 360px;
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: fadeIn 0.8s ease-out;
        }

        .card:hover {
            transform: translateY(-15px) scale(1.02);
            border-color: var(--accent-gold);
            box-shadow: 0 0 30px var(--glow);
        }

        .img-container {
            background: #fff;
            height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
        }

        .img-container img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .details {
            padding: 30px;
        }

        .title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 15px;
            line-height: 1.3;
        }

        .rating {
            color: var(--accent-gold);
            margin-bottom: 25px;
            font-size: 14px;
        }

        /* Buttons Styling */
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            padding: 16px;
            border-radius: 14px;
            text-align: center;
            text-decoration: none;
            font-weight: 700;
            font-size: 15px;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-buy {
            background: var(--accent-gold);
            color: #000;
        }

        .btn-buy:hover {
            background: #fcd34d;
            transform: scale(1.02);
        }

        .btn-copy {
            background: rgba(255, 255, 255, 0.05);
            color: white;
            border: 1px solid #334155;
        }

        .btn-copy:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        /* Toast Popup */
        #toast {
            visibility: hidden;
            background: #10b981;
            color: white;
            padding: 16px 30px;
            border-radius: 100px;
            position: fixed;
            bottom: 40px;
            font-weight: bold;
            z-index: 1000;
            box-shadow: 0 10px 30px rgba(16, 185, 129, 0.4);
        }

        #toast.show { visibility: visible; animation: slideUp 0.4s forwards; }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        footer {
            margin-top: 60px;
            text-align: center;
            font-size: 14px;
            color: var(--text-gray);
        }

        .privacy-btn {
            color: var(--accent-gold);
            cursor: pointer;
            background: none;
            border: none;
            text-decoration: underline;
        }
    </style>
</head>
<body>

<header>
    <div class="logo">Smart Gear PK</div>
    <div class="search-container">
        <input type="text" class="search-box" id="search" placeholder="Search premium gear..." onkeyup="doSearch()">
    </div>
</header>

<div class="nav-bar">
    <div class="nav-item active-tab">All</div>
    <div class="nav-item">Gadgets</div>
    <div class="nav-item" onclick="alert('Coming Soon!')">Comparison</div>
</div>

<div class="card" id="mainCard">
    <div class="img-container">
        <img src="https://m.media-amazon.com/images/I/61iXWpX-B2L._AC_SL1500_.jpg" alt="Smart Ring Gold">
    </div>
    <div class="details">
        <div class="title">Aoyool Smart Ring Health Tracker (Gold Edition)</div>
        <div class="rating">
            <i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i>
            <span style="color:var(--text-gray); margin-left: 10px;">(1.2k+ Reviews)</span>
        </div>
        
        <div class="btn-group">
            <a href="https://www.amazon.com/dp/B0G1CB4F1F?tag=mobilecompa09-20" target="_blank" class="btn btn-buy">
                <i class="fab fa-amazon"></i> BUY ON AMAZON
            </a>
            <button class="btn btn-copy" onclick="copyUrl()">
                <i class="fas fa-copy"></i> COPY LINK
            </button>
        </div>
    </div>
</div>

<div id="toast">✅ Link Copied! Ready to Share</div>

<footer>
    <button class="privacy-btn" onclick="alert('Privacy: We use affiliate links. No personal data is stored.')">Privacy Policy</button>
    <p>© 2026 Smart Gear PK — Built for Performance</p>
</footer>

<script>
    function doSearch() {
        let input = document.getElementById('search').value.toLowerCase();
        let card = document.getElementById('mainCard');
        let title = document.querySelector('.title').innerText.toLowerCase();
        
        if (title.includes(input)) {
            card.style.display = "block";
            card.style.animation = "none"; 
        } else {
            card.style.display = "none";
        }
    }

    function copyUrl() {
        const link = "https://www.amazon.com/dp/B0G1CB4F1F?tag=mobilecompa09-20";
        navigator.clipboard.writeText(link).then(() => {
            let t = document.getElementById("toast");
            t.className = "show";
            setTimeout(() => { t.className = ""; }, 3000);
        });
    }
</script>

</body>
</html>
