<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Gear PK | Premium Experience</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            /* Light Mode Colors */
            --bg-gradient: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            --card-bg: rgba(255, 255, 255, 0.9);
            --text-color: #1f2937;
            --accent-color: #fbbf24;
            --header-bg: rgba(255, 255, 255, 0.8);
        }

        [data-theme="dark"] {
            /* Dark Mode Colors */
            --bg-gradient: linear-gradient(-45deg, #0f172a, #1e293b, #334155, #020617);
            --card-bg: rgba(30, 41, 59, 0.9);
            --text-color: #f8fafc;
            --accent-color: #fbbf24;
            --header-bg: rgba(15, 23, 42, 0.8);
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: var(--bg-gradient);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            color: var(--text-color);
            transition: 0.5s;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Theme Switcher Button */
        .theme-switch {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            background: var(--accent-color);
            border: none;
            padding: 10px 15px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        header {
            width: 100%;
            padding: 40px 0;
            text-align: center;
            background: var(--header-bg);
            backdrop-filter: blur(10px);
            margin-bottom: 30px;
        }

        .logo { font-size: 32px; font-weight: 800; color: var(--accent-color); margin-bottom: 15px; }

        .search-box {
            width: 80%;
            max-width: 400px;
            padding: 12px 20px;
            border-radius: 25px;
            border: 1px solid #ddd;
            outline: none;
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(5px);
            color: var(--text-color);
        }

        /* Nav Tabs */
        .nav-bar { display: flex; gap: 10px; margin-bottom: 30px; }
        .nav-item {
            padding: 8px 20px;
            background: rgba(255,255,255,0.2);
            border-radius: 20px;
            cursor: pointer;
            backdrop-filter: blur(5px);
        }
        .active { background: var(--accent-color); color: black; font-weight: bold; }

        /* Card Design */
        .card {
            background: var(--card-bg);
            width: 340px;
            border-radius: 25px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            transition: 0.3s;
        }

        .card:hover { transform: translateY(-10px); }

        .img-container {
            width: 100%;
            height: 250px;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .img-container img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
        }

        .details { padding: 25px; }
        .title { font-size: 18px; font-weight: bold; margin-bottom: 10px; }

        .btn-group { display: flex; flex-direction: column; gap: 10px; margin-top: 15px; }
        .btn {
            padding: 12px;
            border-radius: 10px;
            text-align: center;
            text-decoration: none;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: 0.3s;
        }

        .btn-amazon { background: #FFD814; color: black; }
        .btn-copy { background: #475569; color: white; border: none; cursor: pointer; }

        #toast {
            visibility: hidden;
            background: #10b981;
            color: white;
            padding: 10px 20px;
            border-radius: 50px;
            position: fixed;
            bottom: 30px;
        }
        #toast.show { visibility: visible; animation: fadeInUp 0.5s; }

        @keyframes fadeInUp { from {opacity: 0; transform: translateY(20px);} to {opacity: 1; transform: translateY(0);} }

        footer { margin: 40px; font-size: 12px; opacity: 0.7; }
    </style>
</head>
<body data-theme="dark">

    <button class="theme-switch" onclick="toggleTheme()">
        <i id="theme-icon" class="fas fa-sun"></i>
        <span id="theme-text">Light Mode</span>
    </button>

    <header>
        <div class="logo">Smart Gear PK</div>
        <input type="text" class="search-box" id="search" placeholder="Search gadgets..." onkeyup="search()">
    </header>

    <div class="nav-bar">
        <div class="nav-item active">All</div>
        <div class="nav-item" onclick="alert('Coming Soon!')">Comparison</div>
    </div>

    <div class="card" id="productCard">
        <div class="img-container">
            <img src="https://m.media-amazon.com/images/I/61iXWpX-B2L._AC_SL1500_.jpg" alt="Smart Ring" onerror="this.src='https://via.placeholder.com/250?text=Product+Image'">
        </div>
        <div class="details">
            <div class="title">Aoyool Smart Ring Health Tracker (Gold)</div>
            <div style="color: #fbbf24; margin-bottom: 10px;">
                <i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star-half-alt"></i>
            </div>
            <div class="btn-group">
                <a href="https://www.amazon.com/dp/B0G1CB4F1F?tag=mobilecompa09-20" target="_blank" class="btn btn-amazon">
                    <i class="fab fa-amazon"></i> ORDER ON AMAZON
                </a>
                <button class="btn btn-copy" onclick="copyLink()">
                    <i class="fas fa-link"></i> COPY LINK
                </button>
            </div>
        </div>
    </div>

    <div id="toast">✅ Link Copied!</div>

    <footer>
        <p onclick="alert('Privacy Policy: We use affiliate links.')" style="cursor:pointer">Privacy Policy</p>
        <p>© 2026 Smart Gear PK</p>
    </footer>

    <script>
        // Dark/Light Theme Logic
        function toggleTheme() {
            const body = document.body;
            const icon = document.getElementById('theme-icon');
            const text = document.getElementById('theme-text');
            
            if (body.getAttribute('data-theme') === 'dark') {
                body.setAttribute('data-theme', 'light');
                icon.className = 'fas fa-moon';
                text.innerText = 'Dark Mode';
            } else {
                body.setAttribute('data-theme', 'dark');
                icon.className = 'fas fa-sun';
                text.innerText = 'Light Mode';
            }
        }

        // Copy Link Logic
        function copyLink() {
            const url = "https://www.amazon.com/dp/B0G1CB4F1F?tag=mobilecompa09-20";
            navigator.clipboard.writeText(url);
            let t = document.getElementById("toast");
            t.className = "show";
            setTimeout(() => { t.className = ""; }, 3000);
        }

        // Search Logic
        function search() {
            let input = document.getElementById('search').value.toLowerCase();
            let card = document.getElementById('productCard');
            let name = document.querySelector('.title').innerText.toLowerCase();
            card.style.display = name.includes(input) ? "block" : "none";
        }
    </script>
</body>
</html>
