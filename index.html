<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Gear PK | Premium Experience</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-overlay: rgba(255, 255, 255, 0.85);
            --wallpaper: url('https://images.unsplash.com/photo-1497215728101-856f4ea42174?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80');
            --card-bg: rgba(255, 255, 255, 0.95);
            --text-color: #1e293b;
            --accent-color: #f59e0b;
            --shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        [data-theme="dark"] {
            --bg-overlay: rgba(15, 23, 42, 0.95);
            --wallpaper: none;
            --card-bg: #1e293b;
            --text-color: #f8fafc;
            --accent-color: #fbbf24;
            --shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            background-image: var(--wallpaper);
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            position: relative;
            transition: background 0.5s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--text-color);
        }

        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-overlay);
            z-index: -1;
            transition: 0.5s;
        }

        /* Theme Switcher */
        .theme-switch {
            position: fixed;
            top: 20px; right: 20px;
            z-index: 100;
            background: var(--accent-color);
            color: #000;
            border: none;
            padding: 10px 18px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            gap: 8px;
            transition: transform 0.2s;
        }

        .theme-switch:active { transform: scale(0.95); }

        header {
            width: 100%;
            text-align: center;
            padding: 40px 0 20px;
        }

        .logo {
            font-size: 32px;
            font-weight: 900;
            color: var(--accent-color);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 20px;
        }

        .search-container {
            width: 90%;
            max-width: 400px;
            margin: 0 auto;
        }

        .search-box {
            width: 100%;
            padding: 12px 20px;
            border-radius: 50px;
            border: 2px solid var(--accent-color);
            background: var(--card-bg);
            color: var(--text-color);
            outline: none;
            transition: 0.3s;
        }

        /* Card Container for Multiple Items */
        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 25px;
            padding: 20px;
            width: 100%;
            max-width: 1200px;
        }

        .card {
            background: var(--card-bg);
            width: 320px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: var(--shadow);
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.3s ease;
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }

        .img-box {
            background: #fff;
            height: 250px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
        }

        .img-box img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
        }

        .details { padding: 20px; text-align: center; }
        .title { font-size: 18px; font-weight: 700; min-height: 50px; }

        .price-tag {
            font-size: 22px;
            font-weight: bold;
            color: var(--accent-color);
            margin: 10px 0;
        }

        .btn-group { display: flex; flex-direction: column; gap: 10px; margin-top: 15px; }
        
        .btn {
            padding: 12px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
            text-transform: uppercase;
            font-size: 14px;
        }

        .btn-buy { background: #FFD814; color: #111; border: 1px solid #F2CA00; }
        .btn-buy:hover { background: #f7df58; }
        
        .btn-copy { background: #475569; color: white; border: none; cursor: pointer; }
        .btn-copy:hover { background: #334155; }

        #toast {
            visibility: hidden;
            background: #059669;
            color: white;
            padding: 12px 25px;
            border-radius: 50px;
            position: fixed;
            bottom: 40px;
            z-index: 1000;
        }
        #toast.show { visibility: visible; animation: fadeInUp 0.4s ease; }

        @keyframes fadeInUp { from {opacity:0; transform:translateY(30px);} to {opacity:1; transform:translateY(0);} }

        footer { margin: 40px 0; opacity: 0.6; font-size: 14px; }
    </style>
</head>
<body data-theme="light">

    <button class="theme-switch" onclick="toggleTheme()">
        <i id="theme-icon" class="fas fa-moon"></i>
        <span id="theme-text">Dark Mode</span>
    </button>

    <header>
        <div class="logo">Smart Gear PK</div>
        <div class="search-container">
            <input type="text" class="search-box" placeholder="Search for gadgets..." onkeyup="doSearch(this.value)">
        </div>
    </header>

    <div class="container">
        <div class="card" id="card1">
            <div class="img-box">
                <img src="https://m.media-amazon.com/images/I/61iXWpX-B2L._AC_SL1500_.jpg" alt="Smart Ring">
            </div>
            <div class="details">
                <div class="title">Aoyool Smart Ring Health Tracker (Gold)</div>
                <div style="color: #fbbf24; margin: 8px 0;">
                    <i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star-half-alt"></i>
                </div>
                <div class="btn-group">
                    <a href="https://www.amazon.com/dp/B0G1CB4F1F?tag=mobilecompa09-20" target="_blank" class="btn btn-buy">BUY ON AMAZON</a>
                    <button class="btn btn-copy" onclick="copyLink('https://www.amazon.com/dp/B0G1CB4F1F?tag=mobilecompa09-20')">COPY LINK</button>
                </div>
            </div>
        </div>
    </div>

    <div id="toast">✅ Link Copied!</div>

    <footer>© 2026 Smart Gear PK | All Rights Reserved</footer>

    <script>
        function toggleTheme() {
            const body = document.body;
            const icon = document.getElementById('theme-icon');
            const text = document.getElementById('theme-text');
            
            if (body.getAttribute('data-theme') === 'light') {
                body.setAttribute('data-theme', 'dark');
                icon.className = 'fas fa-sun';
                text.innerText = 'Light Mode';
            } else {
                body.setAttribute('data-theme', 'light');
                icon.className = 'fas fa-moon';
                text.innerText = 'Dark Mode';
            }
        }

        function copyLink(url) {
            navigator.clipboard.writeText(url);
            const t = document.getElementById("toast");
            t.className = "show";
            setTimeout(() => { t.className = ""; }, 2500);
        }

        function doSearch(val) {
            const query = val.toLowerCase();
            const cards = document.querySelectorAll('.card');
            
            cards.forEach(card => {
                const title = card.querySelector('.title').innerText.toLowerCase();
                card.style.display = title.includes(query) ? "block" : "none";
            });
        }
    </script>
</body>
</html>
