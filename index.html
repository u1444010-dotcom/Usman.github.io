<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Gear PK | Premium Gadgets</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #0b1120;
            --card-bg: #1e293b;
            --accent-color: #fbbf24;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --amazon-gold: #FFD814;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Header & Search */
        header {
            width: 100%;
            text-align: center;
            padding: 40px 0;
            background: linear-gradient(180deg, #1e293b 0%, #0b1120 100%);
        }

        .logo {
            font-size: 36px;
            font-weight: 800;
            color: var(--accent-color);
            letter-spacing: -1px;
            margin-bottom: 25px;
        }

        .search-container {
            position: relative;
            max-width: 450px;
            margin: 0 auto;
            width: 90%;
        }

        .search-box {
            width: 100%;
            padding: 15px 25px;
            border-radius: 50px;
            border: 1px solid #334155;
            background: #0f172a;
            color: white;
            font-size: 16px;
            outline: none;
            box-sizing: border-box;
            transition: 0.3s;
        }

        .search-box:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 15px rgba(251, 191, 36, 0.2);
        }

        /* Navigation Tabs */
        .nav-bar {
            display: flex;
            gap: 12px;
            margin: 25px 0;
            flex-wrap: wrap;
            justify-content: center;
        }

        .nav-item {
            padding: 10px 22px;
            background: #334155;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.3s;
            font-size: 14px;
            font-weight: 600;
            border: 1px solid transparent;
        }

        .nav-item:hover, .active-tab {
            background: var(--accent-color);
            color: #000;
        }

        /* Product Card */
        .card {
            background: var(--card-bg);
            width: 350px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            margin: 20px;
            border: 1px solid #334155;
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-10px);
        }

        .img-container {
            background: white;
            height: 280px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
        }

        .img-container img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .details {
            padding: 25px;
        }

        .title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 12px;
            line-height: 1.4;
        }

        .rating {
            color: #fbbf24;
            font-size: 14px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* Buttons */
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn {
            padding: 14px;
            border-radius: 12px;
            text-align: center;
            text-decoration: none;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            border: none;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-buy { 
            background: var(--amazon-gold); 
            color: #111; 
        }

        .btn-buy:hover { background: #eab308; }

        .btn-copy { 
            background: #475569; 
            color: white; 
        }

        .btn-copy:hover { background: #64748b; }

        /* Toast Popup */
        #toast {
            visibility: hidden;
            background: #10b981;
            color: white;
            padding: 12px 25px;
            border-radius: 50px;
            position: fixed;
            bottom: 30px;
            font-weight: bold;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            z-index: 100;
        }

        #toast.show { visibility: visible; animation: fadeInUp 0.5s; }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        footer {
            margin: 50px 0;
            text-align: center;
            color: var(--text-dim);
            font-size: 13px;
        }

        .privacy-btn {
            background: none;
            border: none;
            color: var(--accent-color);
            cursor: pointer;
            font-size: 13px;
            text-decoration: underline;
        }
    </style>
</head>
<body>

<header>
    <div class="logo">Smart Gear PK</div>
    <div class="search-container">
        <input type="text" class="search-box" id="search" placeholder="Search product name..." onkeyup="doSearch()">
    </div>
</header>

<div class="nav-bar">
    <div class="nav-item active-tab">All</div>
    <div class="nav-item">Gadgets</div>
    <div class="nav-item" onclick="alert('Coming Soon!')">Mobile Comparison</div>
</div>

<div class="card" id="mainCard">
    <div class="img-container">
        <img src="http://googleusercontent.com/image_collection/image_retrieval/4409459351929401961_0" alt="Smart Ring Gold">
    </div>
    <div class="details">
        <div class="title">Smart Ring Health & Fitness Tracker (Gold, Size 8)</div>
        <div class="rating">
            <i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i> 
            <span style="color:var(--text-dim); font-weight: 400;">(1.2k+ Reviews)</span>
        </div>
        
        <div class="btn-group">
            <a href="https://www.amazon.com/dp/B0G1CB4F1F?tag=mobilecompa09-20" target="_blank" class="btn btn-buy">
                <i class="fab fa-amazon"></i> ORDER ON AMAZON
            </a>
            <button class="btn btn-copy" onclick="copyUrl()">
                <i class="fas fa-link"></i> COPY PRODUCT LINK
            </button>
        </div>
    </div>
</div>

<div id="toast">✅ Link Copied Successfully!</div>

<footer>
    <button class="privacy-btn" onclick="alert('Privacy Policy: We do not collect personal data. We use Amazon affiliate links.')">Privacy Policy</button>
    <p>© 2026 Smart Gear PK</p>
</footer>

<script>
    // Real-time Search Engine
    function doSearch() {
        let input = document.getElementById('search').value.toLowerCase();
        let card = document.getElementById('mainCard');
        let productName = document.querySelector('.title').innerText.toLowerCase();
        
        if (productName.includes(input)) {
            card.style.display = "block";
        } else {
            card.style.display = "none";
        }
    }

    // Copy Link with Feedback
    function copyUrl() {
        const link = "https://www.amazon.com/dp/B0G1CB4F1F?tag=mobilecompa09-20";
        navigator.clipboard.writeText(link).then(() => {
            let t = document.getElementById("toast");
            t.className = "show";
            setTimeout(() => { t.className = ""; }, 2500);
        });
    }
</script>

</body>
</html>
